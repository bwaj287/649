<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lotto 微权重预测面板</title>
  <style>
    :root {
      --ink: #16211d;
      --muted: #5e6b63;
      --paper: #fff8ea;
      --green: #176a4b;
      --green-2: #0f4e39;
      --gold: #d99f2b;
      --coral: #d95f43;
      --line: rgba(22, 33, 29, 0.14);
      --shadow: 0 24px 70px rgba(24, 38, 31, 0.18);
      --radius: 28px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Microsoft YaHei UI", "Noto Serif SC", "Songti SC", Cambria, serif;
      background:
        radial-gradient(circle at 18% 8%, rgba(217, 159, 43, 0.25), transparent 28rem),
        radial-gradient(circle at 88% 18%, rgba(23, 106, 75, 0.22), transparent 24rem),
        linear-gradient(135deg, #fbf1dc 0%, #f6e2bd 50%, #e5f0dc 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(22, 33, 29, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(22, 33, 29, 0.035) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.5), transparent 78%);
    }

    .shell {
      width: min(1160px, calc(100% - 36px));
      margin: 0 auto;
      padding: 42px 0 54px;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 24px;
      margin-bottom: 24px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 248, 234, 0.78);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .intro {
      position: relative;
      overflow: hidden;
      padding: 34px;
    }

    .intro::after {
      content: "";
      position: absolute;
      right: -50px;
      bottom: -50px;
      width: 230px;
      height: 230px;
      border-radius: 50%;
      border: 42px solid rgba(217, 159, 43, 0.22);
    }

    .eyebrow {
      display: inline-flex;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(23, 106, 75, 0.12);
      color: var(--green-2);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      position: relative;
      z-index: 1;
      max-width: 720px;
      margin: 22px 0 14px;
      font-size: clamp(36px, 6vw, 76px);
      line-height: 0.95;
      letter-spacing: -0.06em;
    }

    .lead {
      position: relative;
      z-index: 1;
      max-width: 660px;
      margin: 0;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.8;
    }

    .actions {
      padding: 26px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 18px;
    }

    .status-pill {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 15px 16px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.42);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 14px;
    }

    .button-stack { display: grid; gap: 12px; }

    button {
      cursor: pointer;
      border: 0;
      border-radius: 20px;
      padding: 16px 18px;
      color: #fff;
      background: linear-gradient(135deg, var(--green), var(--green-2));
      font: inherit;
      font-weight: 900;
      letter-spacing: 0.02em;
      box-shadow: 0 14px 30px rgba(15, 78, 57, 0.25);
      transition: transform 160ms ease, filter 160ms ease, opacity 160ms ease;
    }

    button.secondary {
      color: var(--ink);
      background: linear-gradient(135deg, #fff7e4, #f2d7a0);
      box-shadow: 0 14px 30px rgba(151, 105, 30, 0.16);
    }

    button:hover:not(:disabled) { transform: translateY(-2px); filter: saturate(1.08); }
    button:disabled { cursor: wait; opacity: 0.62; }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 24px;
    }

    .card {
      position: relative;
      overflow: hidden;
      padding: 28px;
      min-height: 310px;
    }

    .card::before {
      content: "";
      position: absolute;
      right: -30px;
      bottom: -70px;
      width: 180px;
      height: 180px;
      border-radius: 38px;
      background: rgba(23, 106, 75, 0.13);
      transform: rotate(18deg);
    }

    .card h2, .checks h2 {
      margin: 0 0 10px;
      font-size: 24px;
      letter-spacing: -0.03em;
    }

    .section-gap { margin-top: 24px !important; }

    .meta {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .balls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin: 26px 0;
    }

    .ball {
      display: grid;
      place-items: center;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      color: #fff;
      background:
        radial-gradient(circle at 32% 24%, rgba(255, 255, 255, 0.45), transparent 18px),
        linear-gradient(145deg, var(--coral), #9f2f1d);
      box-shadow: inset -9px -10px 18px rgba(60, 12, 5, 0.22), 0 10px 24px rgba(159, 47, 29, 0.22);
      font-size: 22px;
      font-weight: 950;
    }

    .card:nth-child(2) .ball {
      background:
        radial-gradient(circle at 32% 24%, rgba(255, 255, 255, 0.48), transparent 18px),
        linear-gradient(145deg, var(--gold), #9c6b18);
    }

    .top-list {
      position: relative;
      z-index: 1;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 18px;
    }

    .chip {
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.42);
      color: var(--muted);
      font-size: 12px;
    }

    .checks {
      margin-top: 24px;
      padding: 24px;
    }

    .check-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .check {
      padding: 15px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.38);
      color: var(--muted);
      line-height: 1.65;
      font-size: 14px;
    }

    .check strong { color: var(--ink); font-size: 16px; }
    .ok { color: var(--green); font-weight: 900; }
    .warn { color: var(--coral); font-weight: 900; }

    .log {
      margin-top: 18px;
      padding: 15px;
      border-radius: 18px;
      background: rgba(22, 33, 29, 0.08);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .empty {
      padding: 22px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.42);
      color: var(--muted);
      line-height: 1.7;
    }

    @media (max-width: 860px) {
      .hero, .grid, .check-grid { grid-template-columns: 1fr; }
      .shell { width: min(100% - 24px, 760px); padding-top: 20px; }
      .intro, .actions, .card, .checks { padding: 22px; }
      .ball { width: 52px; height: 52px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div class="panel intro">
        <span class="eyebrow">Local Lotto Lab</span>
        <h1>近期权重预测面板</h1>
        <p class="lead">刷新官方中奖数据、检查 CSV 完整性，并按“越近中奖号码权重越高”的模型生成下一期开奖参考号码。</p>
      </div>

      <aside class="panel actions">
        <div class="status-pill">
          <span>当前状态</span>
          <strong id="runState">读取中</strong>
        </div>
        <div class="button-stack">
          <button id="refreshBtn">刷新官方数据并预测</button>
          <button id="localBtn" class="secondary">只用本地数据重新预测</button>
        </div>
        <div class="meta" id="generatedAt">最近生成时间：读取中</div>
      </aside>
    </section>

    <section class="grid" id="cards"></section>

    <section class="panel checks">
      <h2>本次更新</h2>
      <div class="check-grid" id="updates"></div>
      <h2 class="section-gap">数据完整性</h2>
      <div class="check-grid" id="checks"></div>
      <div class="log" id="log">准备好了。</div>
    </section>
  </main>

  <script>
    const cards = document.querySelector("#cards");
    const updates = document.querySelector("#updates");
    const checks = document.querySelector("#checks");
    const log = document.querySelector("#log");
    const runState = document.querySelector("#runState");
    const generatedAt = document.querySelector("#generatedAt");
    const refreshBtn = document.querySelector("#refreshBtn");
    const localBtn = document.querySelector("#localBtn");

    function writeLog(message) {
      const time = new Date().toLocaleTimeString();
      log.textContent = `[${time}] ${message}`;
    }

    function setBusy(isBusy) {
      refreshBtn.disabled = isBusy;
      localBtn.disabled = isBusy;
      runState.textContent = isBusy ? "运行中" : "空闲";
    }

    function formatDateTime(value) {
      if (!value) return "还没有生成记录";
      return new Date(value).toLocaleString();
    }

    function splitPicks(picks) {
      return String(picks || "").split("-").filter(Boolean);
    }

    function parseTopList(text) {
      return String(text || "")
        .split(";")
        .filter(Boolean)
        .slice(0, 8)
        .map((entry) => {
          const [number, score] = entry.split(":");
          const [totalScore, components = ""] = String(score || "").split("(");
          const total = Number(totalScore);
          const compactScore = Number.isFinite(total) ? total.toFixed(2) : totalScore;
          const compactComponents = components ? ` ${components.replace(")", "")}` : "";
          return `${number} / ${compactScore}${compactComponents}`;
        });
    }

    function renderPredictions(predictions) {
      if (!predictions || predictions.length === 0) {
        cards.innerHTML = `<div class="panel card empty">还没有预测结果。点“只用本地数据重新预测”可以先生成一次。</div>`;
        return;
      }

      cards.innerHTML = predictions.map((prediction) => {
        const balls = splitPicks(prediction.picks)
          .map((number) => `<span class="ball">${number}</span>`)
          .join("");
        const topList = parseTopList(prediction.top_12_weighted_numbers)
          .map((item) => `<span class="chip">${item}</span>`)
          .join("");

        return `
          <article class="panel card">
            <h2>${prediction.game}</h2>
            <div class="meta">
              下一期开奖估计：${prediction.estimated_next_draw_date || "未知"}<br>
              最近数据期号：${prediction.latest_draw_number || "未知"}，
              半衰期：${prediction.half_life_draws} 期<br>
              模型：${prediction.model || "未知"}，
              32+ 号码数：${prediction.non_birthday_count ?? "未知"}
            </div>
            <div class="balls">${balls}</div>
            <div class="meta">权重最高候选 Top 8</div>
            <div class="top-list">${topList}</div>
          </article>
        `;
      }).join("");
    }

    function renderUpdates(reports) {
      if (!reports || reports.length === 0) {
        updates.innerHTML = `<div class="check">还没有更新记录。</div>`;
        return;
      }

      updates.innerHTML = reports.map((report) => {
        const isNew = Number(report.newDrawsAfterPreviousLatest) > 0;
        const statusClass = isNew ? "ok" : "warn";
        const statusText = report.mode === "local_reprediction"
          ? "本地重算，未联网下载"
          : isNew
            ? `新增 ${report.newDrawsAfterPreviousLatest} 期`
            : "新增 0 期，已是最新";

        return `
          <div class="check">
            <strong>${report.game}</strong><br>
            状态：<span class="${statusClass}">${statusText}</span><br>
            行数：${report.previousRows} -> ${report.currentRows}
            （变化 ${report.rowsAddedByCount}）<br>
            最新期：${report.previousLatestDrawDate || "无"} / ${report.previousLatestDrawNumber || "无"}
            -> ${report.currentLatestDrawDate || "未知"} / ${report.currentLatestDrawNumber || "未知"}
          </div>
        `;
      }).join("");
    }

    function renderChecks(reports) {
      if (!reports || reports.length === 0) {
        checks.innerHTML = `<div class="check">还没有完整性报告。</div>`;
        return;
      }

      checks.innerHTML = reports.map((report) => {
        const statusClass = report.status === "ok" ? "ok" : "warn";
        return `
          <div class="check">
            <strong>${report.game}</strong><br>
            状态：<span class="${statusClass}">${report.status}</span><br>
            行数：${report.rows} / 预计 ${report.expectedScheduledRows}<br>
            日期：${report.firstDrawDate} 到 ${report.lastDrawDate}<br>
            缺日期：${report.missingScheduledDates}，
            重复日期：${report.duplicateDates}，
            无效主号：${report.invalidMainNumberRows}
          </div>
        `;
      }).join("");
    }

    async function loadStatus() {
      const response = await fetch("/api/status");
      if (!response.ok) throw new Error(await response.text());
      const status = await response.json();
      setBusy(status.isRunning);
      generatedAt.textContent = `最近生成时间：${formatDateTime(status.generatedAt)}`;
      renderPredictions(status.predictions);
      renderUpdates(status.updateSummary);
      renderChecks(status.validationReports);
      return status;
    }

    async function runAction(endpoint, label) {
      try {
        setBusy(true);
        writeLog(`${label}开始。联网刷新可能需要一点时间。`);
        const response = await fetch(endpoint, { method: "POST" });
        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.error || "任务失败");
        }
        renderPredictions(payload.status.predictions);
        renderUpdates(payload.status.updateSummary);
        renderChecks(payload.status.validationReports);
        generatedAt.textContent = `最近生成时间：${formatDateTime(payload.status.generatedAt)}`;
        writeLog(`${label}完成。`);
      } catch (error) {
        writeLog(`出错：${error.message}`);
      } finally {
        setBusy(false);
      }
    }

    refreshBtn.addEventListener("click", () => runAction("/api/refresh", "刷新官方数据并预测"));
    localBtn.addEventListener("click", () => runAction("/api/predict-local", "本地重新预测"));

    loadStatus()
      .then(() => writeLog("面板已读取最新本地结果。"))
      .catch((error) => {
        writeLog(`读取状态失败：${error.message}`);
        setBusy(false);
      });
  </script>
</body>
</html>
