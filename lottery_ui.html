<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lotto Weighted Predictor</title>
  <style>
    :root {
      --ink: #16211d;
      --muted: #5e6b63;
      --paper: #fff8ea;
      --green: #176a4b;
      --green-2: #0f4e39;
      --gold: #d99f2b;
      --coral: #d95f43;
      --line: rgba(22, 33, 29, 0.14);
      --shadow: 0 24px 70px rgba(24, 38, 31, 0.18);
      --radius: 28px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Microsoft YaHei UI", "Noto Serif SC", "Songti SC", Cambria, serif;
      background:
        radial-gradient(circle at 18% 8%, rgba(217, 159, 43, 0.25), transparent 28rem),
        radial-gradient(circle at 88% 18%, rgba(23, 106, 75, 0.22), transparent 24rem),
        linear-gradient(135deg, #fbf1dc 0%, #f6e2bd 50%, #e5f0dc 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(22, 33, 29, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(22, 33, 29, 0.035) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.5), transparent 78%);
    }

    .shell {
      width: min(1160px, calc(100% - 36px));
      margin: 0 auto;
      padding: 42px 0 54px;
    }

    .topbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 14px;
    }

    .language-toggle {
      display: inline-flex;
      gap: 6px;
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 248, 234, 0.72);
      box-shadow: 0 10px 28px rgba(24, 38, 31, 0.12);
      backdrop-filter: blur(18px);
    }

    .language-toggle button {
      min-width: 82px;
      padding: 10px 14px;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      box-shadow: none;
      font-size: 13px;
    }

    .language-toggle button.active {
      color: #fff;
      background: linear-gradient(135deg, var(--green), var(--green-2));
      box-shadow: 0 10px 22px rgba(15, 78, 57, 0.22);
    }

    .hero {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 24px;
      margin-bottom: 24px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 248, 234, 0.78);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .intro {
      position: relative;
      overflow: hidden;
      padding: 34px;
    }

    .intro::after {
      content: "";
      position: absolute;
      right: -50px;
      bottom: -50px;
      width: 230px;
      height: 230px;
      border-radius: 50%;
      border: 42px solid rgba(217, 159, 43, 0.22);
    }

    .eyebrow {
      display: inline-flex;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(23, 106, 75, 0.12);
      color: var(--green-2);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      position: relative;
      z-index: 1;
      max-width: 720px;
      margin: 22px 0 14px;
      font-size: clamp(36px, 6vw, 76px);
      line-height: 0.95;
      letter-spacing: -0.06em;
    }

    .lead {
      position: relative;
      z-index: 1;
      max-width: 660px;
      margin: 0;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.8;
    }

    .actions {
      padding: 26px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 18px;
    }

    .status-pill {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 15px 16px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.42);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 14px;
    }

    .button-stack { display: grid; gap: 12px; }

    button {
      cursor: pointer;
      border: 0;
      border-radius: 20px;
      padding: 16px 18px;
      color: #fff;
      background: linear-gradient(135deg, var(--green), var(--green-2));
      font: inherit;
      font-weight: 900;
      letter-spacing: 0.02em;
      box-shadow: 0 14px 30px rgba(15, 78, 57, 0.25);
      transition: transform 160ms ease, filter 160ms ease, opacity 160ms ease;
    }

    button.secondary {
      color: var(--ink);
      background: linear-gradient(135deg, #fff7e4, #f2d7a0);
      box-shadow: 0 14px 30px rgba(151, 105, 30, 0.16);
    }

    button:hover:not(:disabled) { transform: translateY(-2px); filter: saturate(1.08); }
    button:disabled { cursor: wait; opacity: 0.62; }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 24px;
    }

    .card {
      position: relative;
      overflow: hidden;
      padding: 28px;
      min-height: 310px;
    }

    .card::before {
      content: "";
      position: absolute;
      right: -30px;
      bottom: -70px;
      width: 180px;
      height: 180px;
      border-radius: 38px;
      background: rgba(23, 106, 75, 0.13);
      transform: rotate(18deg);
    }

    .card h2, .checks h2 {
      margin: 0 0 10px;
      font-size: 24px;
      letter-spacing: -0.03em;
    }

    .section-gap { margin-top: 24px !important; }

    .meta {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .balls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin: 26px 0;
    }

    .latest-result {
      position: relative;
      z-index: 1;
      margin: 18px 0 20px;
      padding: 15px;
      border: 1px solid rgba(23, 106, 75, 0.18);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.36);
    }

    .latest-result .balls {
      gap: 8px;
      margin: 12px 0 6px;
    }

    .ball {
      display: grid;
      place-items: center;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      color: #fff;
      background:
        radial-gradient(circle at 32% 24%, rgba(255, 255, 255, 0.45), transparent 18px),
        linear-gradient(145deg, var(--coral), #9f2f1d);
      box-shadow: inset -9px -10px 18px rgba(60, 12, 5, 0.22), 0 10px 24px rgba(159, 47, 29, 0.22);
      font-size: 22px;
      font-weight: 950;
    }

    .ball.drawn {
      width: 44px;
      height: 44px;
      background:
        radial-gradient(circle at 32% 24%, rgba(255, 255, 255, 0.42), transparent 15px),
        linear-gradient(145deg, var(--green), var(--green-2));
      box-shadow: inset -7px -8px 14px rgba(4, 42, 28, 0.22), 0 8px 18px rgba(15, 78, 57, 0.18);
      font-size: 18px;
    }

    .bonus-chip {
      display: inline-flex;
      margin-top: 4px;
      border-color: rgba(217, 159, 43, 0.42);
      color: #7b5314;
      background: rgba(217, 159, 43, 0.14);
    }

    .card:nth-child(2) .ball {
      background:
        radial-gradient(circle at 32% 24%, rgba(255, 255, 255, 0.48), transparent 18px),
        linear-gradient(145deg, var(--gold), #9c6b18);
    }

    .card:nth-child(2) .ball.drawn {
      background:
        radial-gradient(circle at 32% 24%, rgba(255, 255, 255, 0.42), transparent 15px),
        linear-gradient(145deg, var(--green), var(--green-2));
    }

    .top-list {
      position: relative;
      z-index: 1;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 18px;
    }

    .chip {
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.42);
      color: var(--muted);
      font-size: 12px;
    }

    .checks {
      margin-top: 24px;
      padding: 24px;
    }

    .check-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .check {
      padding: 15px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.38);
      color: var(--muted);
      line-height: 1.65;
      font-size: 14px;
    }

    .check strong { color: var(--ink); font-size: 16px; }
    .ok { color: var(--green); font-weight: 900; }
    .warn { color: var(--coral); font-weight: 900; }

    .log {
      margin-top: 18px;
      padding: 15px;
      border-radius: 18px;
      background: rgba(22, 33, 29, 0.08);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .empty {
      padding: 22px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.42);
      color: var(--muted);
      line-height: 1.7;
    }

    @media (max-width: 860px) {
      .hero, .grid, .check-grid { grid-template-columns: 1fr; }
      .shell { width: min(100% - 24px, 760px); padding-top: 20px; }
      .intro, .actions, .card, .checks { padding: 22px; }
      .ball { width: 52px; height: 52px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="topbar">
      <div class="language-toggle" aria-label="Language">
        <button id="langZh" type="button">ZH</button>
        <button id="langEn" type="button">English</button>
      </div>
    </div>

    <section class="hero">
      <div class="panel intro">
        <span class="eyebrow">Local Lotto Lab</span>
        <h1 data-i18n="title">Recency Weighted Lotto Panel</h1>
        <p class="lead" data-i18n="lead">Refresh official draw history, validate the local CSV files, and generate next-draw reference numbers.</p>
      </div>

      <aside class="panel actions">
        <div class="status-pill">
          <span data-i18n="currentStatus">Current status</span>
          <strong id="runState">Loading</strong>
        </div>
        <div class="button-stack">
          <button id="refreshBtn" data-i18n="refreshButton">Refresh official data and predict</button>
          <button id="localBtn" class="secondary" data-i18n="localButton">Predict from local data only</button>
        </div>
        <div class="meta" id="generatedAt">Last generated: Loading</div>
      </aside>
    </section>

    <section class="grid" id="cards"></section>

    <section class="panel checks">
      <h2 data-i18n="updateTitle">This Update</h2>
      <div class="check-grid" id="updates"></div>
      <h2 class="section-gap" data-i18n="integrityTitle">Data Integrity</h2>
      <div class="check-grid" id="checks"></div>
      <div class="log" id="log">Ready.</div>
    </section>
  </main>

  <script>
    function U(codes) {
      return codes
        .split(" ")
        .filter(Boolean)
        .map((code) => String.fromCodePoint(parseInt(code, 16)))
        .join("");
    }

    const translations = {
      zh: {
        pageTitle: "Lotto " + U("5FAE 6743 91CD 9884 6D4B 9762 677F"),
        title: U("8FD1 671F 6743 91CD 9884 6D4B 9762 677F"),
        lead: U("5237 65B0 5B98 65B9 4E2D 5956 6570 636E 3001 68C0 67E5") + " CSV " + U("5B8C 6574 6027 FF0C 5E76 6309 7EC4 5408 6743 91CD 6A21 578B 751F 6210 4E0B 4E00 671F 5F00 5956 53C2 8003 53F7 7801 3002"),
        currentStatus: U("5F53 524D 72B6 6001"),
        refreshButton: U("5237 65B0 5B98 65B9 6570 636E 5E76 9884 6D4B"),
        localButton: U("53EA 7528 672C 5730 6570 636E 91CD 65B0 9884 6D4B"),
        updateTitle: U("672C 6B21 66F4 65B0"),
        integrityTitle: U("6570 636E 5B8C 6574 6027"),
        reading: U("8BFB 53D6 4E2D"),
        idle: U("7A7A 95F2"),
        running: U("8FD0 884C 4E2D"),
        generatedAt: U("6700 8FD1 751F 6210 65F6 95F4"),
        noGeneratedAt: U("8FD8 6CA1 6709 751F 6210 8BB0 5F55"),
        noPredictions: U("8FD8 6CA1 6709 9884 6D4B 7ED3 679C 3002 8BF7 5148 91CD 65B0 9884 6D4B 3002"),
        noUpdates: U("8FD8 6CA1 6709 66F4 65B0 8BB0 5F55 3002"),
        noChecks: U("8FD8 6CA1 6709 5B8C 6574 6027 62A5 544A 3002"),
        nextDraw: U("4E0B 4E00 671F 5F00 5956 4F30 8BA1"),
        latestWinningNumbers: U("6700 8FD1 4E00 671F 5F00 5956 53F7 7801"),
        latestDrawDate: U("5F00 5956 65E5 671F"),
        latestDrawNumber: U("6700 8FD1 6570 636E 671F 53F7"),
        bonusNumber: U("7279 522B 53F7"),
        predictionNumbers: U("9884 6D4B 53F7 7801"),
        halfLife: U("534A 8870 671F"),
        drawUnit: U("671F"),
        model: U("6A21 578B"),
        nonBirthdayCount: "32+ " + U("53F7 7801 6570"),
        topCandidates: U("6743 91CD 6700 9AD8 5019 9009") + " Top 8",
        status: U("72B6 6001"),
        localMode: U("672C 5730 91CD 7B97 FF0C 672A 8054 7F51 4E0B 8F7D"),
        addedDraws: U("65B0 589E") + " {count} " + U("671F"),
        alreadyCurrent: U("65B0 589E") + " 0 " + U("671F FF0C 5DF2 662F 6700 65B0"),
        rows: U("884C 6570"),
        changed: U("53D8 5316"),
        latestDraw: U("6700 65B0 671F"),
        none: U("65E0"),
        unknown: U("672A 77E5"),
        expected: U("9884 8BA1"),
        dates: U("65E5 671F"),
        missingDates: U("7F3A 65E5 671F"),
        duplicateDates: U("91CD 590D 65E5 671F"),
        invalidMainNumbers: U("65E0 6548 4E3B 53F7"),
        ready: U("51C6 5907 597D 4E86 3002"),
        panelLoaded: U("9762 677F 5DF2 8BFB 53D6 6700 65B0 672C 5730 7ED3 679C 3002"),
        actionStart: "{label}" + U("5F00 59CB 3002 8054 7F51 5237 65B0 53EF 80FD 9700 8981 4E00 70B9 65F6 95F4 3002"),
        actionDone: "{label}" + U("5B8C 6210 3002"),
        actionError: U("51FA 9519 FF1A") + "{message}",
        loadFailed: U("8BFB 53D6 72B6 6001 5931 8D25 FF1A") + "{message}",
        refreshLabel: U("5237 65B0 5B98 65B9 6570 636E 5E76 9884 6D4B"),
        localLabel: U("672C 5730 91CD 65B0 9884 6D4B"),
      },
      en: {
        pageTitle: "Lotto Weighted Predictor",
        title: "Recency Weighted Lotto Panel",
        lead: "Refresh official draw history, validate the local CSV files, and generate next-draw reference numbers with a composite weighting model.",
        currentStatus: "Current status",
        refreshButton: "Refresh official data and predict",
        localButton: "Predict from local data only",
        updateTitle: "This Update",
        integrityTitle: "Data Integrity",
        reading: "Loading",
        idle: "Idle",
        running: "Running",
        generatedAt: "Last generated",
        noGeneratedAt: "No generated record yet",
        noPredictions: "No predictions yet. Use \"Predict from local data only\" to generate the first result.",
        noUpdates: "No update record yet.",
        noChecks: "No integrity report yet.",
        nextDraw: "Estimated next draw",
        latestWinningNumbers: "Latest winning numbers",
        latestDrawDate: "Draw date",
        latestDrawNumber: "Latest draw number",
        bonusNumber: "Bonus",
        predictionNumbers: "Prediction",
        halfLife: "Half-life",
        drawUnit: "draws",
        model: "Model",
        nonBirthdayCount: "32+ count",
        topCandidates: "Top 8 weighted candidates",
        status: "Status",
        localMode: "Local recalculation, no download",
        addedDraws: "Added {count} draw(s)",
        alreadyCurrent: "Added 0 draws, already current",
        rows: "Rows",
        changed: "change",
        latestDraw: "Latest draw",
        none: "none",
        unknown: "unknown",
        expected: "expected",
        dates: "Dates",
        missingDates: "missing dates",
        duplicateDates: "duplicate dates",
        invalidMainNumbers: "invalid main numbers",
        ready: "Ready.",
        panelLoaded: "Panel loaded the latest local results.",
        actionStart: "{label} started. Online refresh may take a little while.",
        actionDone: "{label} completed.",
        actionError: "Error: {message}",
        loadFailed: "Failed to load status: {message}",
        refreshLabel: "Refresh official data and predict",
        localLabel: "Local prediction",
      },
    };

    const cards = document.querySelector("#cards");
    const updates = document.querySelector("#updates");
    const checks = document.querySelector("#checks");
    const log = document.querySelector("#log");
    const runState = document.querySelector("#runState");
    const generatedAt = document.querySelector("#generatedAt");
    const refreshBtn = document.querySelector("#refreshBtn");
    const localBtn = document.querySelector("#localBtn");
    const langZh = document.querySelector("#langZh");
    const langEn = document.querySelector("#langEn");

    let currentLanguage = localStorage.getItem("lotto-ui-language") || "zh";
    let currentStatus = null;

    function t(key, replacements = {}) {
      const dictionary = translations[currentLanguage] || translations.zh;
      let value = dictionary[key] || translations.en[key] || key;
      for (const [name, replacement] of Object.entries(replacements)) {
        value = value.replaceAll(`{${name}}`, replacement);
      }
      return value;
    }

    function writeLog(message) {
      const time = new Date().toLocaleTimeString();
      log.textContent = `[${time}] ${message}`;
    }

    function setBusy(isBusy) {
      refreshBtn.disabled = isBusy;
      localBtn.disabled = isBusy;
      runState.textContent = isBusy ? t("running") : t("idle");
    }

    function formatDateTime(value) {
      if (!value) return t("noGeneratedAt");
      return new Date(value).toLocaleString(currentLanguage === "zh" ? "zh-CN" : "en-CA");
    }

    function splitPicks(picks) {
      return String(picks || "").split("-").filter(Boolean);
    }

    function parseTopList(text) {
      return String(text || "")
        .split(";")
        .filter(Boolean)
        .slice(0, 8)
        .map((entry) => {
          const [number, score] = entry.split(":");
          const [totalScore, components = ""] = String(score || "").split("(");
          const total = Number(totalScore);
          const compactScore = Number.isFinite(total) ? total.toFixed(2) : totalScore;
          const compactComponents = components ? ` ${components.replace(")", "")}` : "";
          return `${number} / ${compactScore}${compactComponents}`;
        });
    }

    function renderPredictions(predictions) {
      if (!predictions || predictions.length === 0) {
        cards.innerHTML = `<div class="panel card empty">${t("noPredictions")}</div>`;
        return;
      }

      cards.innerHTML = predictions.map((prediction) => {
        const balls = splitPicks(prediction.picks)
          .map((number) => `<span class="ball">${number}</span>`)
          .join("");
        const latestBalls = splitPicks(prediction.latest_winning_numbers)
          .map((number) => `<span class="ball drawn">${number}</span>`)
          .join("") || `<span class="chip">${t("unknown")}</span>`;
        const latestBonus = prediction.latest_bonus_number
          ? `<span class="chip bonus-chip">${t("bonusNumber")}: ${prediction.latest_bonus_number}</span>`
          : "";
        const topList = parseTopList(prediction.top_12_weighted_numbers)
          .map((item) => `<span class="chip">${item}</span>`)
          .join("");

        return `
          <article class="panel card">
            <h2>${prediction.game}</h2>
            <div class="latest-result">
              <div class="meta">
                <strong>${t("latestWinningNumbers")}</strong><br>
                ${t("latestDrawDate")}: ${prediction.latest_draw_date || prediction.prediction_for_next_draw_after || t("unknown")},
                ${t("latestDrawNumber")}: ${prediction.latest_draw_number || t("unknown")}
              </div>
              <div class="balls">${latestBalls}</div>
              ${latestBonus}
            </div>
            <div class="meta">
              ${t("nextDraw")}: ${prediction.estimated_next_draw_date || t("unknown")}<br>
              ${t("halfLife")}: ${prediction.half_life_draws} ${t("drawUnit")}<br>
              ${t("model")}: ${prediction.model || t("unknown")},
              ${t("nonBirthdayCount")}: ${prediction.non_birthday_count ?? t("unknown")}
            </div>
            <div class="meta">${t("predictionNumbers")}</div>
            <div class="balls">${balls}</div>
            <div class="meta">${t("topCandidates")}</div>
            <div class="top-list">${topList}</div>
          </article>
        `;
      }).join("");
    }

    function renderUpdates(reports) {
      if (!reports || reports.length === 0) {
        updates.innerHTML = `<div class="check">${t("noUpdates")}</div>`;
        return;
      }

      updates.innerHTML = reports.map((report) => {
        const isNew = Number(report.newDrawsAfterPreviousLatest) > 0;
        const statusClass = isNew ? "ok" : "warn";
        const statusText = report.mode === "local_reprediction"
          ? t("localMode")
          : isNew
            ? t("addedDraws", { count: report.newDrawsAfterPreviousLatest })
            : t("alreadyCurrent");

        return `
          <div class="check">
            <strong>${report.game}</strong><br>
            ${t("status")}: <span class="${statusClass}">${statusText}</span><br>
            ${t("rows")}: ${report.previousRows} -> ${report.currentRows}
            (${t("changed")} ${report.rowsAddedByCount})<br>
            ${t("latestDraw")}: ${report.previousLatestDrawDate || t("none")} / ${report.previousLatestDrawNumber || t("none")}
            -> ${report.currentLatestDrawDate || t("unknown")} / ${report.currentLatestDrawNumber || t("unknown")}
          </div>
        `;
      }).join("");
    }

    function renderChecks(reports) {
      if (!reports || reports.length === 0) {
        checks.innerHTML = `<div class="check">${t("noChecks")}</div>`;
        return;
      }

      checks.innerHTML = reports.map((report) => {
        const statusClass = report.status === "ok" ? "ok" : "warn";
        return `
          <div class="check">
            <strong>${report.game}</strong><br>
            ${t("status")}: <span class="${statusClass}">${report.status}</span><br>
            ${t("rows")}: ${report.rows} / ${t("expected")} ${report.expectedScheduledRows}<br>
            ${t("dates")}: ${report.firstDrawDate} -> ${report.lastDrawDate}<br>
            ${t("missingDates")}: ${report.missingScheduledDates},
            ${t("duplicateDates")}: ${report.duplicateDates},
            ${t("invalidMainNumbers")}: ${report.invalidMainNumberRows}
          </div>
        `;
      }).join("");
    }

    function applyLanguage(language) {
      currentLanguage = language;
      localStorage.setItem("lotto-ui-language", language);
      document.documentElement.lang = language === "zh" ? "zh-CN" : "en";
      document.title = t("pageTitle");
      langZh.classList.toggle("active", language === "zh");
      langEn.classList.toggle("active", language === "en");
      document.querySelectorAll("[data-i18n]").forEach((element) => {
        element.textContent = t(element.dataset.i18n);
      });
      generatedAt.textContent = `${t("generatedAt")}: ${formatDateTime(currentStatus?.generatedAt)}`;
      setBusy(Boolean(currentStatus?.isRunning));
      if (currentStatus) {
        renderPredictions(currentStatus.predictions);
        renderUpdates(currentStatus.updateSummary);
        renderChecks(currentStatus.validationReports);
      }
    }

    async function loadStatus() {
      const response = await fetch("/api/status");
      if (!response.ok) throw new Error(await response.text());
      currentStatus = await response.json();
      applyLanguage(currentLanguage);
      return currentStatus;
    }

    async function runAction(endpoint, labelKey) {
      const label = t(labelKey);
      try {
        setBusy(true);
        writeLog(t("actionStart", { label }));
        const response = await fetch(endpoint, { method: "POST" });
        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.error || "Task failed");
        }
        currentStatus = payload.status;
        applyLanguage(currentLanguage);
        writeLog(t("actionDone", { label }));
      } catch (error) {
        writeLog(t("actionError", { message: error.message }));
      } finally {
        setBusy(false);
      }
    }

    langZh.addEventListener("click", () => applyLanguage("zh"));
    langEn.addEventListener("click", () => applyLanguage("en"));
    refreshBtn.addEventListener("click", () => runAction("/api/refresh", "refreshLabel"));
    localBtn.addEventListener("click", () => runAction("/api/predict-local", "localLabel"));

    applyLanguage(currentLanguage);
    writeLog(t("ready"));
    loadStatus()
      .then(() => writeLog(t("panelLoaded")))
      .catch((error) => {
        writeLog(t("loadFailed", { message: error.message }));
        setBusy(false);
      });
  </script>
</body>
</html>
